<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日程調整アプリ (Firebase版)</title>
  
  <!-- カレンダーUIライブラリ Flatpickr -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ja.js"></script>

  <style>
    :root {
      --primary: #1976d2;
      --bg: #f5f7fa;
      --text: #333;
      --border: #ccc;
    }
    body {
      font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.6;
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: #fff;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    h1, h2 { color: var(--primary); }
    
    .form-group { margin-bottom: 20px; }
    label { display: block; font-weight: bold; margin-bottom: 5px; }
    input[type="text"], input[type="text"].flatpickr-input, select {
      width: 100%;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 4px;
      box-sizing: border-box;
    }
    button {
      background-color: var(--primary);
      color: #fff;
      border: none;
      padding: 12px 20px;
      font-size: 16px;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.3s;
    }
    button:hover { background-color: #115293; }
    
    .date-list { margin-top: 10px; }
    .date-item {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      background: #f9f9f9;
      padding: 10px;
      border-radius: 4px;
    }
    .date-item input { width: auto; flex-grow: 1; }
    
    /* 出欠表テーブル */
    .table-wrapper {
      overflow-x: auto;
      margin-top: 20px;
      margin-bottom: 30px;
      border: 1px solid var(--border);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      white-space: nowrap;
    }
    th, td {
      border: 1px solid var(--border);
      padding: 10px;
      text-align: center;
    }
    th { background-color: #f1f1f1; }
    
    th:first-child, td:first-child {
      position: sticky;
      left: 0;
      background-color: #f9f9f9;
      z-index: 1;
      text-align: left;
    }
    
    .mark-circle { color: #2e7d32; font-weight: bold; font-size: 1.2em; }
    .mark-triangle { color: #f57f17; font-weight: bold; font-size: 1.2em; }
    .mark-cross { color: #c62828; font-weight: bold; font-size: 1.2em; }
    
    .comment-icon {
      cursor: help;
      margin-left: 5px;
      font-size: 0.9em;
    }

    .share-box {
      background: #e3f2fd;
      padding: 15px;
      border-radius: 4px;
      margin-bottom: 20px;
      word-break: break-all;
    }

    .attendance-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px dashed var(--border);
    }
    .attendance-row:last-child { border-bottom: none; }
    .attendance-options label { margin-right: 15px; font-weight: normal; cursor: pointer; }

    .hidden { display: none !important; }
    
    .loading {
      text-align: center;
      padding: 40px;
      font-size: 1.2em;
      color: #666;
    }
    
    /* エラー表示用 */
    .error-msg {
      color: #c62828;
      background: #ffebee;
      padding: 15px;
      border-radius: 4px;
      margin-top: 20px;
      text-align: left;
      font-size: 0.9em;
      word-break: break-all;
    }

    /* === 最多〇のハイライト用スタイル === */
    .best-date td {
      background-color: #fffde7 !important; /* 薄い黄色 */
    }
    .best-badge {
      display: inline-block;
      background-color: #fbc02d;
      color: #fff;
      font-size: 0.75em;
      padding: 3px 6px;
      border-radius: 4px;
      margin-bottom: 6px;
      font-weight: bold;
    }
    .stats-cell {
      white-space: nowrap;
    }
  </style>
</head>
<body>

<div class="container">
  
  <!-- ローディング表示 -->
  <div id="view-loading" class="loading">
    読み込み中...<br>
    <div id="error-container" class="error-msg hidden"></div>
  </div>
  
  <!-- ================= 管理者・作成画面 ================= -->
  <div id="view-create" class="hidden">
    <h1>イベント日程調整</h1>
    <p>イベントの候補日を選んで、出欠表を作成しましょう。</p>
    
    <div class="form-group">
      <label for="event-name">イベント名</label>
      <input type="text" id="event-name" placeholder="例：部署の飲み会">
    </div>
    
    <div class="form-group">
      <label for="default-time">基本の時間</label>
      <input type="text" id="default-time" placeholder="例：19:00〜21:00">
      <small style="color: #666;">※候補日を選んだ際、この時間がデフォルトで入力されます</small>
    </div>
    
    <div class="form-group">
      <label>候補日を選択</label>
      <input type="text" id="calendar" placeholder="カレンダーから日付を複数選択">
    </div>
    
    <div class="form-group">
      <label>選択された候補日</label>
      <div id="selected-dates" class="date-list"></div>
    </div>
    
    <button id="btn-create-event">出欠表を作成</button>
  </div>


  <!-- ================= 回答・出欠表画面 ================= -->
  <div id="view-event" class="hidden">
    <h1 id="display-event-name"></h1>
    
    <div class="share-box">
      <strong>共有リンク:</strong><br>
      <a href="#" id="share-link" target="_blank"></a>
      <p style="font-size: 0.9em; color: #555; margin-top: 5px;">参加者にこのURLを共有してください。</p>
    </div>

    <h2>出欠表</h2>
    <div class="table-wrapper">
      <table id="attendance-table"></table>
    </div>

    <h2>出欠を入力する</h2>
    <div class="form-group">
      <label for="user-name">お名前</label>
      <input type="text" id="user-name" placeholder="例：山田 太郎">
      <small style="color: #666;">※同じ名前で入力すると回答が上書きされます。</small>
    </div>

    <div class="form-group" id="attendance-form-list"></div>

    <div class="form-group">
      <label for="user-comment">コメント（任意）</label>
      <input type="text" id="user-comment" placeholder="例：遅れて参加します">
    </div>

    <button id="btn-submit-response">回答を送信</button>
  </div>

</div>

<script type="module">
  // onSnapshot（リアルタイム監視）を追加インポート
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, doc, setDoc, updateDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAZNUBnvO0t4ExD99dHUQYkJUx1rIKO3hk",
    authDomain: "scheduleadjustment-41555.firebaseapp.com",
    projectId: "scheduleadjustment-41555",
    storageBucket: "scheduleadjustment-41555.firebasestorage.app",
    messagingSenderId: "989847585888",
    appId: "1:989847585888:web:6c1d3cc5923facc4dcef05"
  };

  let app, db;
  
  function showError(message, errorObj) {
    const errorContainer = document.getElementById('error-container');
    errorContainer.classList.remove('hidden');
    errorContainer.innerHTML = `<strong>エラーが発生しました:</strong><br>${message}<br><br><small>${errorObj ? errorObj.toString() : ''}</small>`;
    console.error(errorObj);
  }

  try {
    app = initializeApp(firebaseConfig);
    db = getFirestore(app);
  } catch (error) {
    showError("Firebaseの初期化に失敗しました。設定値を確認してください。", error);
  }

  const Api = {
    COLLECTION_NAME: 'events',

    async createEvent(eventData) {
      const newEventRef = doc(collection(db, this.COLLECTION_NAME));
      const eventId = newEventRef.id;
      eventData.id = eventId;
      // 改良: responses を配列ではなくオブジェクト（マップ）として初期化
      eventData.responses = {}; 
      await setDoc(newEventRef, eventData);
      return eventId;
    },

    async submitResponse(eventId, responseData) {
      const docRef = doc(db, this.COLLECTION_NAME, eventId);
      
      // 改良: データを一度取得して上書きするのではなく、
      // データベース上で特定の人（名前）のデータだけをピンポイントで更新（統合）する
      // これにより、他の人が同時に回答していても消えなくなります。
      const updatePayload = {};
      updatePayload[`responses.${responseData.name}`] = responseData;
      
      await updateDoc(docRef, updatePayload);
      return true;
    },

    // 改良: リアルタイムでデータの変更を監視する関数
    listenEvent(eventId, callback, errorCallback) {
      const docRef = doc(db, this.COLLECTION_NAME, eventId);
      return onSnapshot(docRef, (docSnap) => {
        if (docSnap.exists()) {
          callback(docSnap.data());
        } else {
          callback(null); // 削除された場合など
        }
      }, errorCallback);
    }
  };

  let currentEventId = null;
  let currentEventData = null;
  let selectedDates = [];

  function showView(viewId) {
    document.getElementById('view-loading').classList.add('hidden');
    document.getElementById('view-create').classList.add('hidden');
    document.getElementById('view-event').classList.add('hidden');
    document.getElementById(viewId).classList.remove('hidden');
  }

  function showCreateScreen() {
    showView('view-create');

    flatpickr("#calendar", {
      locale: "ja",
      mode: "multiple",
      dateFormat: "Y-m-d",
      onChange: function(selectedDatesObj, dateStr, instance) {
        selectedDates = selectedDatesObj.map(d => instance.formatDate(d, "Y-m-d (D)"));
        renderSelectedDates();
      }
    });

    document.getElementById('default-time').addEventListener('input', renderSelectedDates);

    document.getElementById('btn-create-event').addEventListener('click', async () => {
      const eventName = document.getElementById('event-name').value.trim();
      if (!eventName) {
        alert("イベント名を入力してください。");
        return;
      }
      
      const dateItems = document.querySelectorAll('.date-item');
      if (dateItems.length === 0) {
        alert("候補日を1つ以上選択してください。");
        return;
      }

      const datesData = Array.from(dateItems).map((item) => {
        const dateText = item.querySelector('span').textContent;
        const timeInput = item.querySelector('input').value;
        return { date: dateText, time: timeInput };
      });

      const newEvent = { name: eventName, dates: datesData };

      try {
        const newId = await Api.createEvent(newEvent);
        window.location.href = `${window.location.origin}${window.location.pathname}?id=${newId}`;
      } catch (error) {
        showError("イベントの作成に失敗しました。Firestoreの権限（セキュリティルール）などを確認してください。", error);
      }
    });
  }

  function renderSelectedDates() {
    const container = document.getElementById('selected-dates');
    const defaultTime = document.getElementById('default-time').value.trim();
    
    const currentTimes = [];
    selectedDates.forEach((_, index) => {
      const el = document.getElementById(`time-${index}`);
      if (el) currentTimes[index] = el.value;
    });

    container.innerHTML = '';
    selectedDates.forEach((date, index) => {
      const div = document.createElement('div');
      div.className = 'date-item';
      const timeValue = currentTimes[index] !== undefined ? currentTimes[index] : defaultTime;
      div.innerHTML = `
        <span>${date}</span>
        <input type="text" id="time-${index}" value="${timeValue}" placeholder="時間 (例: 19:00〜)">
      `;
      container.appendChild(div);
    });
  }

  async function loadEventScreen(eventId) {
    // リアルタイムリスナーを開始
    Api.listenEvent(eventId, (eventData) => {
      if (!eventData) {
        alert("イベントが見つかりません。削除された可能性があります。");
        window.location.href = window.location.pathname;
        return;
      }
      
      // データが更新されるたびに画面を再描画
      currentEventData = eventData;
      
      // 最初の読み込み時のみ画面切り替えとフォーム描画を行う
      if (document.getElementById('view-event').classList.contains('hidden')) {
        showView('view-event');
        document.getElementById('display-event-name').textContent = eventData.name;
        
        const shareUrl = `${window.location.origin}${window.location.pathname}?id=${eventId}`;
        const shareLinkEl = document.getElementById('share-link');
        shareLinkEl.href = shareUrl;
        shareLinkEl.textContent = shareUrl;

        renderAttendanceForm();
      }

      // 出欠表は常に最新データで再描画
      renderAttendanceTable();

    }, (error) => {
      showError("データの読み込みに失敗しました。Firestoreの設定等を確認してください。", error);
    });

    // 回答送信ボタンのイベントリスナー（1度だけ登録）
    document.getElementById('btn-submit-response').onclick = async () => {
      const name = document.getElementById('user-name').value.trim();
      if (!name) {
        alert("お名前を入力してください。");
        return;
      }

      const comment = document.getElementById('user-comment').value.trim();
      const attendances = {};

      currentEventData.dates.forEach((d, i) => {
        const selected = document.querySelector(`input[name="attend-${i}"]:checked`);
        attendances[d.date] = selected ? selected.value : '△';
      });

      const responseData = { name, comment, attendances };
      const btn = document.getElementById('btn-submit-response');
      btn.disabled = true;
      btn.textContent = "送信中...";

      try {
        await Api.submitResponse(eventId, responseData);
        // リロードは不要になりました（onSnapshotで自動更新されるため）
        alert("回答を送信しました！\n下部または右側の出欠表に反映されます。");
        // 名前欄は残し、コメント欄だけクリアする
        document.getElementById('user-comment').value = '';
      } catch (error) {
        showError("回答の送信に失敗しました。", error);
      } finally {
        btn.disabled = false;
        btn.textContent = "回答を送信";
      }
    };
  }

  function renderAttendanceTable() {
    const table = document.getElementById('attendance-table');
    const event = currentEventData;
    let html = '';

    // responses はオブジェクトなので配列に変換する
    const responsesList = event.responses ? Object.values(event.responses) : [];
    const hasResponses = responsesList.length > 0;

    let maxO = 0;
    const stats = event.dates.map(d => {
      let countO = 0, countT = 0, countX = 0;
      if (hasResponses) {
        responsesList.forEach(res => {
          const mark = res.attendances[d.date];
          if (mark === '●') countO++;
          else if (mark === '△') countT++;
          else if (mark === '×') countX++;
        });
      }
      if (countO > maxO) maxO = countO;
      return { countO, countT, countX };
    });

    html += '<tr><th>日程</th><th>集計</th>';
    if (hasResponses) {
      responsesList.forEach(res => {
        const commentHtml = res.comment ? `<span class="comment-icon" title="${res.comment}">💬</span>` : '';
        html += `<th>${res.name}${commentHtml}</th>`;
      });
    } else {
      html += '<th>回答者</th>';
    }
    html += '</tr>';

    event.dates.forEach((d, index) => {
      const st = stats[index];
      const isBest = hasResponses && maxO > 0 && st.countO === maxO;
      const rowClass = isBest ? 'best-date' : '';

      html += `<tr class="${rowClass}">`;
      
      const badgeHtml = isBest ? '<span class="best-badge">👑 最多</span><br>' : '';
      html += `<td>${badgeHtml}${d.date}<br><small>${d.time}</small></td>`;
      
      html += `<td class="stats-cell">
        <span class="mark-circle">●</span>${st.countO} 
        <span class="mark-triangle">△</span>${st.countT} 
        <span class="mark-cross">×</span>${st.countX}
      </td>`;

      if (hasResponses) {
        responsesList.forEach(res => {
          const mark = res.attendances[d.date] || '-';
          let cssClass = '';
          if (mark === '●') cssClass = 'mark-circle';
          else if (mark === '△') cssClass = 'mark-triangle';
          else if (mark === '×') cssClass = 'mark-cross';
          
          html += `<td class="${cssClass}">${mark}</td>`;
        });
      } else {
        html += `<td style="color: #999; font-size: 0.9em;">まだ回答がありません</td>`;
      }

      html += '</tr>';
    });

    table.innerHTML = html;
  }

  function renderAttendanceForm() {
    const container = document.getElementById('attendance-form-list');
    container.innerHTML = '';
    const event = currentEventData;

    if (!event.dates || event.dates.length === 0) return;

    event.dates.forEach((d, i) => {
      const div = document.createElement('div');
      div.className = 'attendance-row';
      div.innerHTML = `
        <div><strong>${d.date}</strong> <small>${d.time}</small></div>
        <div class="attendance-options">
          <label><input type="radio" name="attend-${i}" value="●"> ● 出席</label>
          <label><input type="radio" name="attend-${i}" value="△" checked> △ 未定</label>
          <label><input type="radio" name="attend-${i}" value="×"> × 欠席</label>
        </div>
      `;
      container.appendChild(div);
    });
  }

  async function initApp() {
    try {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');

      if (id) {
        currentEventId = id;
        // リスナーが初期化・画面遷移を担当
        loadEventScreen(id);
      } else {
        showCreateScreen();
      }
    } catch (error) {
      showError("画面の初期化に失敗しました。", error);
    }
  }

  initApp();

</script>

</body>
</html>
