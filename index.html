<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日程調整アプリ (Firebase版)</title>
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ja.js"></script>

  <style>
    :root { --primary: #1976d2; --bg: #f5f7fa; --text: #333; --border: #ccc; }
    body { font-family: sans-serif; background-color: var(--bg); color: var(--text); padding: 20px; }
    .container { max-width: 800px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    h1, h2 { color: var(--primary); }
    .form-group { margin-bottom: 20px; }
    input[type="text"], select { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 4px; box-sizing: border-box; }
    button { background-color: var(--primary); color: #fff; border: none; padding: 12px 20px; cursor: pointer; border-radius: 4px; }
    .date-item { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; background: #f9f9f9; padding: 10px; border-radius: 4px; }
    .date-item input { width: 150px; }
    .table-wrapper { overflow-x: auto; margin-top: 20px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border: 1px solid var(--border); padding: 10px; text-align: center; }
    th { background-color: #f1f1f1; }
    .hidden { display: none !important; }
    .badge { display: inline-block; color: #fff; font-size: 0.75em; padding: 3px 6px; border-radius: 4px; font-weight: bold; }
    .badge-1 { background-color: #fbc02d; }
  </style>
</head>
<body>

<div class="container">
  <div id="view-loading">読み込み中...</div>
  
  <div id="view-create" class="hidden">
    <h1>イベント日程調整</h1>
    <div class="form-group">
      <label>イベント名</label>
      <input type="text" id="event-name" placeholder="例：部署の飲み会">
    </div>
    <div class="form-group">
      <label>候補日を選択</label>
      <input type="text" id="calendar" placeholder="日付を選択">
    </div>
    <div class="form-group">
      <label>候補日時（編集可能）</label>
      <div id="selected-dates"></div>
    </div>
    <button id="btn-create-event">出欠表を作成</button>
  </div>

  <div id="view-event" class="hidden">
    <h1 id="display-event-name"></h1>
    <div id="edit-container" class="hidden" style="background: #fff3e0; padding: 15px; border-radius: 4px; margin-bottom: 20px;">
      <label>回答を修正</label>
      <select id="edit-user-select"></select>
      <button id="btn-start-edit">修正ボタン</button>
    </div>
    <div class="table-wrapper"><table id="attendance-table"></table></div>
    <h2 id="form-title">出欠を入力</h2>
    <input type="text" id="user-name" placeholder="お名前">
    <div id="attendance-form-list"></div>
    <input type="text" id="user-comment" placeholder="コメント">
    <button id="btn-submit-response">送信</button>
    <button id="btn-cancel-edit" class="hidden">キャンセル</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, doc, setDoc, updateDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAZNUBnvO0t4ExD99dHUQYkJUx1rIKO3hk",
    projectId: "scheduleadjustment-41555",
    storageBucket: "scheduleadjustment-41555.firebasestorage.app",
    messagingSenderId: "989847585888",
    appId: "1:989847585888:web:6c1d3cc5923facc4dcef05"
  };

  const db = getFirestore(initializeApp(firebaseConfig));

  function showCreateScreen() {
    document.getElementById('view-loading').classList.add('hidden');
    document.getElementById('view-create').classList.remove('hidden');

    flatpickr("#calendar", {
      locale: "ja", mode: "multiple", dateFormat: "Y-m-d",
      onChange: function(dates, dateStr, instance) {
        const sorted = dates.sort((a, b) => a - b);
        const container = document.getElementById('selected-dates');
        container.innerHTML = '';
        sorted.forEach((d, i) => {
          const div = document.createElement('div');
          div.className = 'date-item';
          div.innerHTML = `<span data-raw="${instance.formatDate(d, 'Y-m-d')}">${instance.formatDate(d, "Y-m-d (D)")}</span>
                           <input type="text" id="time-${i}" placeholder="時間">`;
          container.appendChild(div);
        });
      }
    });

    document.getElementById('btn-create-event').onclick = async () => {
      const name = document.getElementById('event-name').value;
      const dateElements = document.querySelectorAll('.date-item');
      const dates = Array.from(dateElements).map(el => ({
        date: el.querySelector('span').textContent,
        raw: el.querySelector('span').getAttribute('data-raw'),
        time: el.querySelector('input').value
      })).sort((a, b) => new Date(a.raw) - new Date(b.raw));

      const newRef = doc(collection(db, 'events'));
      await setDoc(newRef, { name, dates, responses: {} });
      window.location.href = `?id=${newRef.id}`;
    };
  }

  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  if (!id) showCreateScreen();
  else {
    onSnapshot(doc(db, 'events', id), (snap) => {
      if (snap.exists()) {
        document.getElementById('view-loading').classList.add('hidden');
        document.getElementById('view-event').classList.remove('hidden');
        document.getElementById('display-event-name').textContent = snap.data().name;
      }
    });
  }
</script>
</body>
</html>
