<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日程調整アプリ (Firebase版)</title>
  
  <!-- カレンダーUIライブラリ Flatpickr -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ja.js"></script>

  <style>
    :root {
      --primary: #1976d2;
      --bg: #f5f7fa;
      --text: #333;
      --border: #ccc;
    }
    body {
      font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.6;
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: #fff;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    h1, h2 { color: var(--primary); }
    
    .form-group { margin-bottom: 20px; }
    label { display: block; font-weight: bold; margin-bottom: 5px; }
    input[type="text"], input[type="text"].flatpickr-input, select {
      width: 100%;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 4px;
      box-sizing: border-box;
    }
    button {
      background-color: var(--primary);
      color: #fff;
      border: none;
      padding: 12px 20px;
      font-size: 16px;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.3s;
    }
    button:hover { background-color: #115293; }
    
    .date-list { margin-top: 10px; }
    .date-item {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      background: #f9f9f9;
      padding: 10px;
      border-radius: 4px;
    }
    .date-item input { width: auto; flex-grow: 1; }
    
    /* 出欠表テーブル */
    .table-wrapper {
      overflow-x: auto;
      margin-top: 20px;
      margin-bottom: 30px;
      border: 1px solid var(--border);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      white-space: nowrap;
    }
    th, td {
      border: 1px solid var(--border);
      padding: 10px;
      text-align: center;
    }
    th { background-color: #f1f1f1; }
    
    th:first-child, td:first-child {
      position: sticky;
      left: 0;
      background-color: #f9f9f9;
      z-index: 1;
      text-align: left;
    }
    
    .mark-circle { color: #2e7d32; font-weight: bold; font-size: 1.2em; }
    .mark-triangle { color: #f57f17; font-weight: bold; font-size: 1.2em; }
    .mark-cross { color: #c62828; font-weight: bold; font-size: 1.2em; }
    
    .comment-icon {
      cursor: help;
      margin-left: 5px;
      font-size: 0.9em;
    }

    .share-box {
      background: #e3f2fd;
      padding: 15px;
      border-radius: 4px;
      margin-bottom: 20px;
      word-break: break-all;
    }

    .attendance-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px dashed var(--border);
    }
    .attendance-row:last-child { border-bottom: none; }
    .attendance-options label { margin-right: 15px; font-weight: normal; cursor: pointer; }

    .hidden { display: none !important; }
    
    .loading {
      text-align: center;
      padding: 40px;
      font-size: 1.2em;
      color: #666;
    }
    
    /* エラー表示用 */
    .error-msg {
      color: #c62828;
      background: #ffebee;
      padding: 15px;
      border-radius: 4px;
      margin-top: 20px;
      text-align: left;
      font-size: 0.9em;
      word-break: break-all;
    }
  </style>
</head>
<body>

<div class="container">
  
  <!-- ローディング表示 -->
  <div id="view-loading" class="loading">
    読み込み中...<br>
    <div id="error-container" class="error-msg hidden"></div>
  </div>
  
  <!-- ================= 管理者・作成画面 ================= -->
  <div id="view-create" class="hidden">
    <h1>イベント日程調整</h1>
    <p>イベントの候補日を選んで、出欠表を作成しましょう。</p>
    
    <div class="form-group">
      <label for="event-name">イベント名</label>
      <input type="text" id="event-name" placeholder="例：部署の飲み会">
    </div>
    
    <div class="form-group">
      <label for="default-time">基本の時間</label>
      <input type="text" id="default-time" placeholder="例：19:00〜21:00">
      <small style="color: #666;">※候補日を選んだ際、この時間がデフォルトで入力されます</small>
    </div>
    
    <div class="form-group">
      <label>候補日を選択</label>
      <input type="text" id="calendar" placeholder="カレンダーから日付を複数選択">
    </div>
    
    <div class="form-group">
      <label>選択された候補日</label>
      <div id="selected-dates" class="date-list"></div>
    </div>
    
    <button id="btn-create-event">出欠表を作成</button>
  </div>


  <!-- ================= 回答・出欠表画面 ================= -->
  <div id="view-event" class="hidden">
    <h1 id="display-event-name"></h1>
    
    <div class="share-box">
      <strong>共有リンク:</strong><br>
      <a href="#" id="share-link" target="_blank"></a>
      <p style="font-size: 0.9em; color: #555; margin-top: 5px;">参加者にこのURLを共有してください。</p>
    </div>

    <h2>出欠表</h2>
    <div class="table-wrapper">
      <table id="attendance-table"></table>
    </div>

    <h2>出欠を入力する</h2>
    <div class="form-group">
      <label for="user-name">お名前</label>
      <input type="text" id="user-name" placeholder="例：山田 太郎">
      <small style="color: #666;">※同じ名前で入力すると回答が上書きされます。</small>
    </div>

    <div class="form-group" id="attendance-form-list"></div>

    <div class="form-group">
      <label for="user-comment">コメント（任意）</label>
      <input type="text" id="user-comment" placeholder="例：遅れて参加します">
    </div>

    <button id="btn-submit-response">回答を送信</button>
    <button id="btn-go-home" style="background:#666; margin-left:10px;">新しくイベントを作る</button>
  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc, updateDoc, collection } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAZNUBnvO0t4ExD99dHUQYkJUx1rIKO3hk",
    authDomain: "scheduleadjustment-41555.firebaseapp.com",
    projectId: "scheduleadjustment-41555",
    storageBucket: "scheduleadjustment-41555.firebasestorage.app",
    messagingSenderId: "989847585888",
    appId: "1:989847585888:web:6c1d3cc5923facc4dcef05"
  };

  let app, db;
  
  // エラーを画面に表示する関数
  function showError(message, errorObj) {
    const errorContainer = document.getElementById('error-container');
    errorContainer.classList.remove('hidden');
    errorContainer.innerHTML = `<strong>エラーが発生しました:</strong><br>${message}<br><br><small>${errorObj ? errorObj.toString() : ''}</small>`;
    console.error(errorObj);
  }

  try {
    app = initializeApp(firebaseConfig);
    db = getFirestore(app);
  } catch (error) {
    showError("Firebaseの初期化に失敗しました。設定値を確認してください。", error);
  }

  const Api = {
    COLLECTION_NAME: 'events',

    async createEvent(eventData) {
      const newEventRef = doc(collection(db, this.COLLECTION_NAME));
      const eventId = newEventRef.id;
      eventData.id = eventId;
      eventData.responses = [];
      await setDoc(newEventRef, eventData);
      return eventId;
    },

    async getEvent(eventId) {
      const docRef = doc(db, this.COLLECTION_NAME, eventId);
      const docSnap = await getDoc(docRef);
      if (docSnap.exists()) {
        return docSnap.data();
      }
      return null;
    },

    async submitResponse(eventId, responseData) {
      const docRef = doc(db, this.COLLECTION_NAME, eventId);
      const docSnap = await getDoc(docRef);
      if (!docSnap.exists()) throw new Error("Event not found");

      const event = docSnap.data();
      const index = event.responses.findIndex(r => r.name === responseData.name);
      if (index >= 0) {
        event.responses[index] = responseData;
      } else {
        event.responses.push(responseData);
      }
      
      await updateDoc(docRef, { responses: event.responses });
      return true;
    }
  };

  let currentEventId = null;
  let currentEventData = null;
  let selectedDates = [];

  function showView(viewId) {
    document.getElementById('view-loading').classList.add('hidden');
    document.getElementById('view-create').classList.add('hidden');
    document.getElementById('view-event').classList.add('hidden');
    document.getElementById(viewId).classList.remove('hidden');
  }

  function showCreateScreen() {
    showView('view-create');

    flatpickr("#calendar", {
      locale: "ja",
      mode: "multiple",
      dateFormat: "Y-m-d",
      onChange: function(selectedDatesObj, dateStr, instance) {
        selectedDates = selectedDatesObj.map(d => instance.formatDate(d, "Y-m-d (D)"));
        renderSelectedDates();
      }
    });

    document.getElementById('default-time').addEventListener('input', renderSelectedDates);

    document.getElementById('btn-create-event').addEventListener('click', async () => {
      const eventName = document.getElementById('event-name').value.trim();
      if (!eventName) {
        alert("イベント名を入力してください。");
        return;
      }
      if (selectedDates.length === 0) {
        alert("候補日を1つ以上選択してください。");
        return;
      }

      const datesData = selectedDates.map((date, index) => {
        const timeInput = document.getElementById(`time-${index}`).value;
        return { date: date, time: timeInput };
      });

      const newEvent = { name: eventName, dates: datesData };

      try {
        const newId = await Api.createEvent(newEvent);
        window.location.href = `${window.location.origin}${window.location.pathname}?id=${newId}`;
      } catch (error) {
        showError("イベントの作成に失敗しました。Firestoreの権限（セキュリティルール）などを確認してください。", error);
      }
    });
  }

  function renderSelectedDates() {
    const container = document.getElementById('selected-dates');
    const defaultTime = document.getElementById('default-time').value.trim();
    
    const currentTimes = [];
    selectedDates.forEach((_, index) => {
      const el = document.getElementById(`time-${index}`);
      if (el) currentTimes[index] = el.value;
    });

    container.innerHTML = '';
    selectedDates.forEach((date, index) => {
      const div = document.createElement('div');
      div.className = 'date-item';
      const timeValue = currentTimes[index] !== undefined ? currentTimes[index] : defaultTime;
      div.innerHTML = `
        <span>${date}</span>
        <input type="text" id="time-${index}" value="${timeValue}" placeholder="時間 (例: 19:00〜)">
      `;
      container.appendChild(div);
    });
  }

  async function loadEventScreen(eventId) {
    try {
      const event = await Api.getEvent(eventId);
      if (!event) {
        alert("イベントが見つかりません。");
        window.location.href = window.location.pathname;
        return;
      }
      currentEventData = event;
      showView('view-event');

      document.getElementById('display-event-name').textContent = event.name;
      
      const shareUrl = `${window.location.origin}${window.location.pathname}?id=${eventId}`;
      const shareLinkEl = document.getElementById('share-link');
      shareLinkEl.href = shareUrl;
      shareLinkEl.textContent = shareUrl;

      renderAttendanceTable();
      renderAttendanceForm();

      document.getElementById('btn-go-home').addEventListener('click', () => {
        window.location.href = window.location.pathname;
      });

      document.getElementById('btn-submit-response').onclick = async () => {
        const name = document.getElementById('user-name').value.trim();
        if (!name) {
          alert("お名前を入力してください。");
          return;
        }

        const comment = document.getElementById('user-comment').value.trim();
        const attendances = {};

        event.dates.forEach((d, i) => {
          const selected = document.querySelector(`input[name="attend-${i}"]:checked`);
          attendances[d.date] = selected ? selected.value : '△';
        });

        const responseData = { name, comment, attendances };

        try {
          await Api.submitResponse(eventId, responseData);
          alert("回答を送信しました！");
          window.location.reload();
        } catch (error) {
          showError("回答の送信に失敗しました。", error);
        }
      };
    } catch (error) {
      showError("データの読み込みに失敗しました。Firestoreの設定等を確認してください。", error);
    }
  }

  // アプリの初期化処理を関数でラップして実行
  async function initApp() {
    try {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');

      if (id) {
        currentEventId = id;
        await loadEventScreen(id);
      } else {
        showCreateScreen();
      }
    } catch (error) {
      showError("画面の初期化に失敗しました。", error);
    }
  }

  // 実行開始
  initApp();

</script>

</body>
</html>
