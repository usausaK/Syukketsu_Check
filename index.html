<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日程調整アプリ (Firebase版)</title>
  
  <!-- カレンダーUIライブラリ Flatpickr -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ja.js"></script>

  <style>
    :root {
      --primary: #1976d2;
      --bg: #f5f7fa;
      --text: #333;
      --border: #ccc;
    }
    body {
      font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.6;
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: #fff;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    h1, h2 { color: var(--primary); }
    
    .form-group { margin-bottom: 20px; }
    label { display: block; font-weight: bold; margin-bottom: 5px; }
    input[type="text"], input[type="text"].flatpickr-input, select {
      width: 100%;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 4px;
      box-sizing: border-box;
    }
    button {
      background-color: var(--primary);
      color: #fff;
      border: none;
      padding: 12px 20px;
      font-size: 16px;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.3s;
    }
    button:hover { background-color: #115293; }
    
    .date-list { margin-top: 10px; }
    .date-item {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      background: #f9f9f9;
      padding: 10px 15px;
      border-radius: 4px;
      border: 1px solid #eee;
    }
    .date-item input { width: 120px; flex-shrink: 0; }
    .date-item span { flex-grow: 1; font-weight: bold; }
    
    .btn-remove {
      background: transparent;
      color: #c62828;
      border: none;
      font-size: 1.5em;
      cursor: pointer;
      padding: 0 5px;
      margin-left: 5px;
      transition: color 0.2s;
    }
    .btn-remove:hover { color: #ef5350; }
    
    .table-wrapper {
      overflow-x: auto;
      margin-top: 20px;
      margin-bottom: 30px;
      border: 1px solid var(--border);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      white-space: nowrap;
    }
    th, td {
      border: 1px solid var(--border);
      padding: 10px;
      text-align: center;
    }
    th { background-color: #f1f1f1; }
    
    th:first-child, td:first-child {
      position: sticky;
      left: 0;
      background-color: #f9f9f9;
      z-index: 1;
      text-align: left;
    }
    
    .mark-circle { color: #2e7d32; font-weight: bold; font-size: 1.2em; }
    .mark-triangle { color: #f57f17; font-weight: bold; font-size: 1.2em; }
    .mark-cross { color: #c62828; font-weight: bold; font-size: 1.2em; }

    .share-box {
      background: #e3f2fd;
      padding: 15px;
      border-radius: 4px;
      margin-bottom: 20px;
      word-break: break-all;
    }

    .attendance-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px dashed var(--border);
    }
    .attendance-row:last-child { border-bottom: none; }
    .attendance-options label { margin-right: 15px; font-weight: normal; cursor: pointer; }

    .hidden { display: none !important; }
    
    .loading {
      text-align: center;
      padding: 40px;
      font-size: 1.2em;
      color: #666;
    }
    
    .error-msg {
      color: #c62828;
      background: #ffebee;
      padding: 15px;
      border-radius: 4px;
      margin-top: 20px;
      text-align: left;
      font-size: 0.9em;
      word-break: break-all;
    }

    .rank-1 td { background-color: #fffde7 !important; }
    .rank-2 td { background-color: #fafafa !important; }
    .rank-3 td { background-color: #fafafa !important; }
    
    .badge {
      display: inline-block;
      color: #fff;
      font-size: 0.75em;
      padding: 3px 6px;
      border-radius: 4px;
      margin-bottom: 6px;
      font-weight: bold;
    }
    .badge-1 { background-color: #fbc02d; }
    .badge-2 { background-color: #9e9e9e; }
    .badge-3 { background-color: #8d6e63; }

    .stats-cell {
      white-space: nowrap;
    }
  </style>
</head>
<body>

<div class="container">
  
  <div id="view-loading" class="loading">
    読み込み中...<br>
    <div id="error-container" class="error-msg hidden"></div>
  </div>
  
  <div id="view-create" class="hidden">
    <h1>イベント日程調整</h1>
    <p>イベントの候補日を選んで、出欠表を作成しましょう。</p>
    
    <div class="form-group">
      <label for="event-name">イベント名</label>
      <input type="text" id="event-name" placeholder="例：部署の飲み会">
    </div>
    
    <div class="form-group">
      <label for="default-time">基本の時間</label>
      <input type="text" id="default-time" placeholder="例：19:00 & 21:00">
      <small style="color: #666;">※「19:00 & 21:00」のように区切って入力すると一括追加できます。</small>
    </div>
    
    <div class="form-group">
      <label>カレンダーから候補日を追加</label>
      <input type="text" id="calendar" placeholder="ここをクリックして日付を追加">
    </div>
    
    <div class="form-group">
      <label>選択された候補日</label>
      <div id="selected-dates" class="date-list">
        <p style="color:#999; font-size:0.9em; margin:0;">上のカレンダーから日付を選ぶと、ここに追加されます。</p>
      </div>
    </div>
    
    <button id="btn-create-event">出欠表を作成</button>
  </div>


  <div id="view-event" class="hidden">
    <h1 id="display-event-name"></h1>
    
    <div class="share-box">
      <strong>共有リンク:</strong><br>
      <a href="#" id="share-link" target="_blank"></a>
      <p style="font-size: 0.9em; color: #555; margin-top: 5px;">参加者にこのURLを共有してください(^o^)☆彡</p>
    </div>

    <div id="edit-container" class="hidden" style="background: #fff3e0; padding: 15px; border-radius: 4px; margin-bottom: 25px; border: 1px solid #ffe082;">
      <label style="color: #e65100; font-weight: bold; display: block; margin-bottom: 5px;">自分の回答を修正する</label>
      <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
        <select id="edit-user-select" style="width: auto; min-width: 180px; padding: 8px;">
          <option value="">-- 名前を選択 --</option>
        </select>
        <button id="btn-start-edit" style="background-color: #ef6c00; padding: 8px 15px; font-size: 14px;">修正する</button>
      </div>
    </div>

    <h2>出欠表</h2>
    <div class="table-wrapper">
      <table id="attendance-table"></table>
    </div>

    <h2 id="form-title">出欠を入力する</h2>
    <div class="form-group">
      <label for="user-name">お名前</label>
      <input type="text" id="user-name" placeholder="例：山田 太郎">
    </div>

    <div class="form-group" id="attendance-form-list"></div>

    <div class="form-group">
      <label for="user-comment">コメント（任意）</label>
      <input type="text" id="user-comment" placeholder="例：遅れて参加します">
    </div>

    <button id="btn-submit-response">回答を送信</button>
    <button id="btn-cancel-edit" class="hidden" style="background:#666; margin-left:10px;">修正をキャンセル</button>
  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, doc, setDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAZNUBnvO0t4ExD99dHUQYkJUx1rIKO3hk",
    authDomain: "scheduleadjustment-41555.firebaseapp.com",
    projectId: "scheduleadjustment-41555",
    storageBucket: "scheduleadjustment-41555.firebasestorage.app",
    messagingSenderId: "989847585888",
    appId: "1:989847585888:web:6c1d3cc5923facc4dcef05"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // URL用の文字列エンコード関数
  function getShareUrl(eventId) {
    const baseUrl = `${window.location.origin}${window.location.pathname}`;
    // (^o^)☆彡 をパーセントエンコーディングした文字列
    const suffix = "%28%5Eo%5E%29%E2%98%86%E5%BD%A1";
    return `${baseUrl}?id=${eventId}#${suffix}`;
  }

  const Api = {
    async createEvent(eventData) {
      let eventId = '';
      const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
      for (let i = 0; i < 8; i++) eventId += chars.charAt(Math.floor(Math.random() * chars.length));
      
      const newEventRef = doc(db, 'events', eventId);
      eventData.id = eventId;
      eventData.responses = {}; 
      await setDoc(newEventRef, eventData);
      return eventId;
    },

    async submitResponse(eventId, responseData) {
      const docRef = doc(db, 'events', eventId);
      const updatePayload = {};
      updatePayload[`responses.${responseData.name}`] = responseData;
      await updateDoc(docRef, updatePayload);
    }
  };

  let currentEventId = null;
  let currentEventData = null;
  let selectedCandidateDates = [];

  function showView(viewId) {
    document.querySelectorAll('.container > div:not(#view-loading)').forEach(el => el.classList.add('hidden'));
    document.getElementById(viewId).classList.remove('hidden');
  }

  // 簡略化された初期表示処理
  function initApp() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    if (id) {
      currentEventId = id;
      loadEventScreen(id);
    } else {
      showCreateScreen();
    }
  }

  function showCreateScreen() {
    showView('view-create');
    // フラットピッカー等の省略
  }

  async function loadEventScreen(eventId) {
    showView('view-event');
    const docRef = doc(db, 'events', eventId);
    onSnapshot(docRef, (docSnap) => {
      if (docSnap.exists()) {
        currentEventData = docSnap.data();
        document.getElementById('display-event-name').textContent = currentEventData.name;
        
        const shareUrl = getShareUrl(eventId);
        const link = document.getElementById('share-link');
        link.href = shareUrl;
        link.textContent = shareUrl;
      }
    });
  }

  initApp();
</script>
</body>
</html>
